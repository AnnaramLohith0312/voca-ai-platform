<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VOCA | Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#5ed9d3",
                      "primary-container": "#0ea5a0",
                      "on-primary-container": "#003331",
                      "background": "#0b0e12",
                      "surface": "#13161b",
                      "surface-variant": "#171c24",
                      "outline-variant": "rgba(255, 255, 255, 0.08)",
                      "on-surface": "#e1e2e8",
                      "on-surface-variant": "#bcc9c8"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "1rem",
                      "xl": "1.5rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Space Grotesk", "sans-serif"],
                      "body": ["Inter", "sans-serif"]
              }
            },
          },
        }
    </script>
<style>
        body {
            background-color: #0b0e12;
            color: #e1e2e8;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .chat-scroll-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-scroll-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-scroll-container::-webkit-scrollbar-thumb {
            background: #1f2530;
            border-radius: 10px;
        }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-message-in {
            animation: messageIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .chip-active {
            background-color: #5ed9d3 !important;
            color: #003735 !important;
        }
        .user-bubble {
            background: rgba(14, 165, 160, 0.15);
            border: 1px solid rgba(14, 165, 160, 0.3);
            color: #5ed9d3;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-background">
<!-- Progress Bar -->
<div class="fixed top-0 left-0 w-full h-[2px] bg-[#1f2530] z-[100]">
<div class="h-full bg-primary-container transition-all duration-700 ease-out" id="progress-bar" style="width: 20%;"></div>
</div>
<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md h-16 flex items-center px-6 md:px-12 max-w-[1440px] mx-auto left-1/2 -translate-x-1/2">
<div class="flex items-center">
<span class="text-[24px] font-headline font-semibold tracking-tight text-on-surface">VOCA</span>
</div>
<div class="ml-auto">
<button class="text-on-surface-variant hover:text-on-surface transition-colors text-sm font-medium">
            Support
        </button>
</div>
</header>
<!-- Chat Area -->
<main class="flex-1 overflow-y-auto pt-24 pb-48 chat-scroll-container flex flex-col items-center" id="chat-thread">
<div class="w-full max-w-[680px] px-6 flex flex-col gap-8" id="message-container">
<!-- Initial Message 1 -->
<div class="flex flex-col items-start gap-3 animate-message-in">
<div class="p-5 rounded-xl bg-surface border border-outline-variant shadow-lg max-w-[90%] text-[16px] leading-relaxed text-on-surface">
                Let's get a sense of where you naturally lean in tech.
            </div>
</div>
<!-- Initial Question -->
<div class="flex flex-col items-start gap-3 animate-message-in" style="animation-delay: 0.2s;">
<div class="p-5 rounded-xl bg-surface border border-outline-variant shadow-lg max-w-[90%] text-[24px] font-headline font-semibold text-on-surface">
                What kind of work pulls you in most?
            </div>
</div>
</div>
</main>
<!-- Interaction Area -->
<footer class="fixed bottom-0 w-full z-50 bg-background/95 backdrop-blur-xl border-t border-outline-variant">
<div class="max-w-[680px] mx-auto px-6 py-10 flex flex-col items-center gap-6">
<p class="text-[13px] text-on-surface-variant/70 font-medium">
            Choose the option that feels closest to you
        </p>
<!-- Chips Wrapper -->
<div class="flex flex-wrap justify-center gap-3 animate-message-in" id="chips-container" style="animation-delay: 0.4s;">
<!-- Buttons dynamically rendered via JS -->
</div>
</div>
</footer>
<script>
    const steps = [
        {
            question: "What kind of work pulls you in most?",
            options: ["Engineering", "Design", "Strategy", "Data"],
            progress: "20%"
        },
        {
            question: "What do you enjoy more day to day?",
            options: ["Solving problems", "Building things", "Organizing ideas", "Working with people"],
            progress: "40%"
        },
        {
            question: "What matters most in your next role?",
            options: ["Growth", "Creative freedom", "Stability", "Impact"],
            progress: "70%"
        },
        {
            question: "Thank you. We're finalizing your profile now.",
            options: [],
            progress: "100%"
        }
    ];

    let currentStep = 0;

    function renderChips() {
        const container = document.getElementById('chips-container');
        container.innerHTML = '';
        
        const currentOptions = steps[currentStep].options;
        if (currentOptions.length === 0) {
            container.innerHTML = `<span class="text-primary font-medium animate-pulse">Analysis complete...</span>`;
            return;
        }

        currentOptions.forEach(option => {
            const btn = document.createElement('button');
            btn.className = "h-[44px] px-6 rounded-full bg-surface-variant border border-outline-variant hover:border-primary/50 transition-all text-[15px] font-medium text-on-surface outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary active:scale-95";
            btn.textContent = option;
            btn.setAttribute('aria-pressed', 'false');
            btn.onclick = () => handleSelection(option);
            container.appendChild(btn);
        });
    }

    function addMessage(text, isUser = false) {
        const container = document.getElementById('message-container');
        const div = document.createElement('div');
        
        if (isUser) {
            div.className = "flex flex-col items-end gap-2 animate-message-in self-end w-full";
            div.innerHTML = `
                <div class="p-4 px-6 rounded-xl user-bubble text-[16px] font-medium shadow-sm max-w-[80%]">
                    ${text}
                </div>
            `;
        } else {
            div.className = "flex flex-col items-start gap-3 animate-message-in";
            const isQuestion = currentStep < steps.length;
            const bubbleClass = isQuestion ? "text-[24px] font-headline font-semibold" : "text-[16px] leading-relaxed";
            div.innerHTML = `
                <div class="p-5 rounded-xl bg-surface border border-outline-variant shadow-lg max-w-[90%] ${bubbleClass} text-on-surface">
                    ${text}
                </div>
            `;
        }
        
        container.appendChild(div);
        
        // Smooth scroll to bottom
        const main = document.getElementById('chat-thread');
        main.scrollTo({
            top: main.scrollHeight,
            behavior: 'smooth'
        });
    }

    function handleSelection(value) {
        // 1. Show user message
        addMessage(value, true);
        
        // 2. Increment Step
        currentStep++;
        
        // 3. Update Progress Bar
        const bar = document.getElementById('progress-bar');
        bar.style.width = steps[currentStep].progress;

        // 4. Show Next Question after short delay
        setTimeout(() => {
            addMessage(steps[currentStep].question);
            renderChips();
        }, 600);
    }

    // Initial load
    window.onload = () => {
        renderChips();
        // Set initial progress
        document.getElementById('progress-bar').style.width = steps[0].progress;
    };
</script>
</body></html>
